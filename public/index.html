<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Navigation Libre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.2) 0, transparent 50%);
        }

        .header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 2rem;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 0.75rem 1.25rem 0.75rem 3rem;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            background: rgba(15, 23, 42, 0.9);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
        }

        .search-btn {
            position: absolute;
            right: 0.25rem;
            top: 0.25rem;
            bottom: 0.25rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 0 1.25rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .search-btn:hover {
            background: var(--primary-hover);
        }

        .frame-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #ffffff;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .frame-container.active {
            opacity: 1;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        .welcome-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .welcome-screen h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-screen p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            line-height: 1.6;
        }

        .quick-links {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            pointer-events: auto;
        }

        .chip {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        .chip:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            Nexus
        </div>

        <form class="search-container" id="search-form">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="search-bar" id="url-input"
                placeholder="Entrez un domaine proxy ou URL (ex: https://poki.com)" autocomplete="off">
            <button type="submit" class="search-btn">Naviguer</button>
        </form>

        <div style="width: 100px;"></div> <!-- Spacer -->
    </header>

    <div class="welcome-screen" id="welcome">
        <h1>Navigation Débloquée</h1>
        <p>Contournez les restrictions réseau en toute sécurité. Entrez une URL en haut pour commencer la navigation via
            notre proxy sécurisé.</p>

        <div class="quick-links">
            <div class="chip" onclick="loadUrl('https://poki.com')">Poki</div>
            <div class="chip" onclick="loadUrl('https://roblox.com')">Roblox</div>
            <div class="chip" onclick="loadUrl('https://discord.com')">Discord</div>
            <div class="chip" onclick="loadUrl('https://youtube.com')">YouTube</div>
        </div>
    </div>

    <div class="frame-container" id="frame-wrapper">
        <iframe id="proxy-frame"></iframe>
    </div>

    <script src="/uv.bundle.js"></script>
    <script src="/uv.config.js"></script>
    <script>
        const form = document.getElementById('search-form');
        const input = document.getElementById('url-input');
        const frameWrapper = document.getElementById('frame-wrapper');
        const frame = document.getElementById('proxy-frame');
        const welcome = document.getElementById('welcome');

        // Initialisation de l'Arme Ultime : Service Worker Ultraviolet
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', {
                scope: __uv$config.prefix
            }).then(() => {
                console.log('✅ Service Worker furtif (UV) installé avec succès !');
            }).catch(console.error);
        }

        function formatUrl(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                return 'https://' + url;
            }
            return url;
        }

        async function loadUrl(targetUrl) {
            const finalUrl = formatUrl(targetUrl);
            input.value = finalUrl;

            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
            }, 500);

            // Attendre que le Service Worker soit prêt avant de charger
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.ready;
            }

            // Encodage cryptographique de l'URL pour passer inaperçu aux yeux du lycée
            const encodedUrl = __uv$config.encodeUrl(finalUrl);
            const proxyUrl = __uv$config.prefix + encodedUrl;

            frame.src = proxyUrl;
            frameWrapper.classList.add('active');
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim() !== '') {
                loadUrl(input.value.trim());
            }
        });
    </script>
</body>

</html>
